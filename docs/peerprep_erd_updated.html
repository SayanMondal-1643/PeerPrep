<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const def = `erDiagram
  EXAM ||--o{ BRANCH : has
  BRANCH ||--o{ SUBJECT : offers
  SUBJECT ||--o{ TOPIC : is_divided_into
  TOPIC ||--o{ STUDY_MATERIAL : has
  USER ||--o{ STUDY_MATERIAL : uploads
  USER ||--o{ RATING : gives
  STUDY_MATERIAL ||--o{ RATING : receives
  USER ||--o{ COMMENT : posts
  STUDY_MATERIAL ||--o{ COMMENT : has
  USER ||--o{ REPORT : submits
  STUDY_MATERIAL ||--o{ REPORT : receives
  USER ||--o{ TOPPER_BADGE_APPLICATION : applies

  EXAM {
    string exam_id PK
    string exam_name
  }
  BRANCH {
    string branch_id PK
    string branch_name
    string exam_id FK
  }
  SUBJECT {
    string subject_id PK
    string subject_name
    string branch_id FK
  }
  TOPIC {
    string topic_id PK
    string topic_name
    string subject_id FK
  }
  USER {
    string user_id PK
    string name
    string email
    string password
    string role
    string accountStatus
    string institutionName
    string idProofUrl
    string verificationStatus
  }
  STUDY_MATERIAL {
    string material_id PK
    string title
    string description
    string fileUrl
    date uploadDate
    string status
    string user_id FK
    string topic_id FK
    boolean isBestMaterial
    boolean isTopperMaterial
    boolean isAIPicked
    number ratingsAverage
    number ratingsQuantity
  }
  RATING {
    string rating_id PK
    number ratingValue
    string user_id FK
    string material_id FK
  }
  COMMENT {
    string comment_id PK
    string comment_text
    date createdAt
    string user_id FK
    string material_id FK
  }
  REPORT {
    string report_id PK
    string reportReason
    string comment
    date reportDate
    string status
    string materialTitle
    string user_id FK
    string material_id FK
  }
  TOPPER_BADGE_APPLICATION {
    string application_id PK
    string subject
    string exam
    string branch
    number year
    number cgpa
    string markSheetUrl
    string status
    string user_id FK
  }
`;
const { svg } = await mermaid.render('erd-svg', def);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
